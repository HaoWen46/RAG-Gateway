services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-raggateway}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-raggateway}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    environment:
      POSTGRES_HOST: postgres
      REDIS_ADDR: redis:6379
      OPA_ENDPOINT: http://opa:8181
      RETRIEVAL_ADDR: retrieval:50051
      GATEWAY_PORT: "8080"
    depends_on:
      - postgres
      - redis

  retrieval:
    build: ./retrieval
    ports:
      - "50051:50051"
    environment:
      POSTGRES_HOST: postgres
      REDIS_ADDR: redis:6379
      PAGEINDEX_ADDR: pageindex-worker:50052
      RETRIEVAL_GRPC_PORT: "50051"
    depends_on:
      - postgres
      - redis

  pageindex-worker:
    build: ./pageindex-worker
    ports:
      - "50052:50052"
    environment:
      PAGEINDEX_GRPC_PORT: "50052"

  adapter-service:
    build: ./adapter-service
    ports:
      - "50053:50053"
    environment:
      ADAPTER_GRPC_PORT: "50053"

volumes:
  pgdata:
